name: 'branch-watch'
description: 'Check if branches or forks are behind their upstream — surface drift before it becomes a merge conflict'
author: 'nuri-yoo'

branding:
  icon: 'git-branch'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token with repo scope'
    required: false
    default: ${{ github.token }}
  command:
    description: 'Command to run: branches | forks | prs'
    required: false
    default: 'branches'
  repo:
    description: 'Target repository in owner/name format (defaults to current repo)'
    required: false
    default: ${{ github.repository }}
  behind_only:
    description: 'Only show branches or forks that are behind (true/false)'
    required: false
    default: 'false'

outputs:
  result:
    description: 'JSON output from branch-watch (requires --json flag)'
    value: ${{ steps.run.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Install branch-watch
      shell: bash
      run: |
        version=$(curl -s https://api.github.com/repos/nuri-yoo/branch-watch/releases/latest \
          | grep '"tag_name"' | cut -d'"' -f4)
        archive="branch-watch-${version}-x86_64-unknown-linux-gnu.tar.gz"
        curl -fsSL "https://github.com/nuri-yoo/branch-watch/releases/download/${version}/${archive}" \
          | tar xz
        chmod +x bw
        sudo mv bw /usr/local/bin/bw

    - name: Run branch-watch
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        ARGS="${{ inputs.command }} ${{ inputs.repo }}"
        if [[ "${{ inputs.behind_only }}" == "true" ]]; then
          ARGS="$ARGS --behind-only"
        fi
        result=$(bw $ARGS --json 2>/dev/null || bw $ARGS)
        echo "result=$result" >> $GITHUB_OUTPUT
        bw $ARGS

